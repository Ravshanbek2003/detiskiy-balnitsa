name: CI

on:
   push:
      branches:
         - main
   pull_request:
      branches:
         - main
   workflow_dispatch:

concurrency:
   group: ci-${{ github.ref }}
   cancel-in-progress: true

jobs:
   build:
      name: Install and build
      runs-on: ubuntu-latest
      permissions:
         contents: read
      steps:
         - name: Checkout code
           uses: actions/checkout@v4

         - name: Setup Node.js
           uses: actions/setup-node@v4
           with:
              node-version: 20
              cache: yarn
              cache-dependency-path: yarn.lock

         - name: Install dependencies
           run: yarn install --frozen-lockfile --non-interactive

         - name: Build project
           run: yarn build
